services:
  # Local development stack only. Compose reads variables from the repository-root .env file.
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    image: gradle:8.10.2-jdk21
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_JDBC_URL: jdbc:postgresql://postgres:5432/${DATABASE_NAME}?currentSchema=public
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      APP_PUBLIC_BACKEND_BASE_URL: http://localhost:8080
      APP_FRONTEND_BASE_URL: http://localhost:5173
    volumes:
      - ./backend:/app
      - gradle_cache:/home/gradle/.gradle
    command: ["/bin/sh", "-lc", "sh ./gradlew run"]
    ports:
      - "127.0.0.1:8080:8080"

  frontend:
    image: node:22-alpine
    working_dir: /app
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    volumes:
      - ./pna-web:/app
      - pna_web_node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    command:
      - /bin/sh
      - -lc
      - corepack enable && pnpm config set store-dir /pnpm/store && pnpm install && pnpm dev --host 0.0.0.0 --port 5173 --strictPort
    ports:
      - "127.0.0.1:5173:5173"

volumes:
  postgres_data:
  gradle_cache:
  pna_web_node_modules:
  pnpm_store:
