openapi: 3.0.3
info:
  title: PNA Backend API
  version: 1.0.0
  description: Kotlin backend API for authentication and number lookup.
servers:
  - url: /
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok
  /api/v1/auth/google/redirect:
    get:
      summary: Start or finish Google OAuth login
      description: Redirects the browser to Google OAuth, then handles the callback on the same route and creates the backend session cookie.
      responses:
        '302':
          description: Redirect to Google OAuth or back to the frontend when already authenticated
        '200':
          description: HTML handoff back to the frontend after callback processing
  /api/v1/number/search:
    post:
      summary: Search number details
      description: Looks up details for a phone number. Requires an authenticated session cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchNumberRequest'
      responses:
        '200':
          description: Number lookup succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchNumberResponse'
        '400':
          description: Request body is invalid or number is empty
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid auth session cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    SearchNumberRequest:
      type: object
      required:
        - number
      properties:
        number:
          type: string
          example: "+14155552671"
    SearchNumberResponse:
      type: object
      properties:
        message:
          type: string
          example: "country=Estonia, countryCode=372, regionCode=EE, numberType=Fixed line, internationalFormat=+372 607 3001, carrier=unknown, timeZones=Europe/Tallinn"
    GoogleAuthResponse:
      type: object
      properties:
        subject:
          type: string
          example: "10293847561029384756"
        email:
          type: string
          nullable: true
          example: user@example.com
        emailVerified:
          type: boolean
          nullable: true
          example: true
        name:
          type: string
          nullable: true
          example: Jane Doe
        picture:
          type: string
          nullable: true
          example: https://lh3.googleusercontent.com/a/example
        givenName:
          type: string
          nullable: true
          example: Jane
        familyName:
          type: string
          nullable: true
          example: Doe
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Invalid Google ID token
